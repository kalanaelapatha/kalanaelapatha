name: GitHub Metrics

on:
  # Refresh every 12 hours
  schedule:
    - cron: "0 */12 * * *"
  # Run manually from the Actions tab
  workflow_dispatch:
  # Run on push to main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      # 1) Overview card — activity, commits, PRs, issues, repos
      - name: Overview
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: kalanaelapatha
          filename: github-metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Colombo
          config_animations: yes

      # 2) Most-used languages (replaces the top-langs card)
      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: kalanaelapatha
          filename: github-metrics-languages.svg
          base: ""
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage

      # 3) Achievements (replaces the trophies card)
      - name: Achievements
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: kalanaelapatha
          filename: github-metrics-achievements.svg
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: C
